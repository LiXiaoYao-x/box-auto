<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>集装箱装载优化</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#f0f4f8;--bg1:#ffffff;--bg2:#f7fafc;--bg3:#edf2f7;
  --bd:#e2e8f0;--bd2:#cbd5e0;--bd3:#a0b4c8;
  --t1:#1a2535;--t2:#4a6280;--t3:#8fa5be;
  --blue:#2563eb;--blue-lt:#eff6ff;--blue-md:#dbeafe;
  --teal:#0d9488;--amber:#b45309;--amber-lt:#fef3c7;
  --red:#dc2626;--green:#16a34a;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.04);
  --r:10px;
}
body{background:var(--bg0);color:var(--t1);font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;min-height:100vh;padding-bottom:60px}
#app{max-width:700px;margin:0 auto;padding:0 16px}
.hd{padding:20px 0 16px;border-bottom:2px solid var(--bd)}
.hd h1{font-size:21px;font-weight:800;color:var(--blue);letter-spacing:-.4px}
.hd p{font-size:12px;color:var(--t3);margin-top:4px;line-height:1.5}
.hd-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-top:12px}
.ubar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ubar-lbl{font-size:12px;color:var(--t2);font-weight:600}
.ubtn-g{display:flex;border:1.5px solid var(--bd2);border-radius:7px;overflow:hidden}
.ubtn{padding:5px 14px;background:transparent;border:none;color:var(--t2);font-size:13px;cursor:pointer;transition:.15s;font-weight:600}
.ubtn.on{background:var(--blue);color:#fff}
.ubtn:not(.on):hover{background:var(--blue-lt);color:var(--blue)}
.cvt-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);cursor:pointer;user-select:none;font-weight:500}
.cvt-lbl input{cursor:pointer;accent-color:var(--blue);width:13px;height:13px}
.print-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;background:var(--bg1);border:1.5px solid var(--bd2);border-radius:7px;font-size:12px;color:var(--t2);cursor:pointer;font-weight:600;transition:.15s;font-family:inherit}
.print-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.print-btn svg{width:14px;height:14px;flex-shrink:0}
.card{background:var(--bg1);border:1.5px solid var(--bd);border-radius:var(--r);padding:16px;margin-top:14px;box-shadow:var(--shadow)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.ctitle{font-size:13px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:8px}
.ctitle-bar{width:3px;height:15px;background:var(--blue);border-radius:2px;flex-shrink:0}
select{background:var(--bg2);border:1.5px solid var(--bd2);border-radius:7px;color:var(--t1);font-size:12px;padding:5px 9px;cursor:pointer;outline:none;font-family:inherit;font-weight:500;max-width:100%}
select:focus{border-color:var(--blue)}
.drow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:500px){.drow{grid-template-columns:repeat(2,1fr)}}
@media(max-width:330px){.drow{grid-template-columns:1fr}}
.df label{font-size:11px;color:var(--t2);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.01em}
.iu{display:flex;min-width:0}
.iu input{flex:1;min-width:0;width:0;background:var(--bg2);border:1.5px solid var(--bd2);border-right:none;border-radius:7px 0 0 7px;color:var(--t1);font-size:13px;padding:7px 8px;outline:none;transition:.15s;font-family:inherit;font-weight:500}
.iu input::placeholder{color:#a0b4c8;font-size:12px;font-weight:400}
.iu input:focus{border-color:var(--blue);background:#fff}
.iu .u{background:var(--bg3);border:1.5px solid var(--bd2);border-radius:0 7px 7px 0;color:var(--t2);font-size:11px;padding:7px 7px;white-space:nowrap;font-weight:600;flex-shrink:0}
input[type=text]{background:var(--bg2);border:1.5px solid var(--bd2);border-radius:7px;color:var(--t1);font-size:13px;padding:7px 10px;outline:none;transition:.15s;width:100%;font-family:inherit;font-weight:500}
input[type=text]:focus{border-color:var(--blue);background:#fff}
.btabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.btab{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--bd2);background:transparent;color:var(--t2);display:flex;align-items:center;gap:5px;transition:.15s;font-family:inherit;font-weight:600}
.btab.on{color:#fff}
.btab:not(.on):hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.bdot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.bdel{color:#c03030;font-size:16px;line-height:1;margin-left:2px;font-weight:700}
.vnote{background:var(--amber-lt);border:1.5px solid #fcd34d;border-left:3px solid var(--amber);border-radius:7px;padding:10px 12px;font-size:12px;color:var(--amber);margin-top:14px;line-height:1.65;font-weight:500}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
@media(max-width:380px){.krow{grid-template-columns:repeat(2,1fr)}}
.kcard{background:var(--bg0);border:1.5px solid var(--bd);border-radius:9px;padding:13px 8px;text-align:center}
.kval{font-size:22px;font-weight:900;line-height:1}
.klbl{font-size:11px;color:var(--t2);margin-top:5px;font-weight:600}
.ksub{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500}
.rrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.ritem{background:var(--bg0);border-radius:8px;padding:9px 8px;text-align:center;border:1.5px solid var(--bd)}
.rval{font-size:14px;font-weight:700;color:var(--amber)}
.rlbl{font-size:10px;color:var(--t3);margin-top:3px;font-weight:600}
.dlist{list-style:none}
.dlist li{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px;gap:10px;flex-wrap:wrap}
.dlist li:last-child{border-bottom:none}
.dk{color:var(--t2);font-weight:600;flex-shrink:0;padding-top:1px}
.dv{font-weight:700;text-align:right;flex:1;min-width:0;word-break:break-all}
.mix-badge{display:inline-flex;align-items:center;gap:4px;background:var(--blue-md);color:var(--blue);border-radius:5px;font-size:11px;font-weight:800;padding:2px 8px;letter-spacing:.02em}
.new-badge{display:inline-flex;align-items:center;background:#dcfce7;color:var(--green);border-radius:4px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:4px}
.addbtn{background:transparent;border:1.5px dashed var(--bd2);color:var(--t3);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;transition:.15s;font-family:inherit;font-weight:600}
.addbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
canvas{display:block;width:100%}
.cv-wrap{position:relative;border-radius:9px;overflow:hidden;cursor:grab;border:1.5px solid var(--bd);background:var(--bg2)}
.cv-wrap:active{cursor:grabbing}
.cv-legend{display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--t2);flex-wrap:wrap;font-weight:600}
.cv-leg-item{display:flex;align-items:center;gap:6px}
.tbl-wrap{overflow-x:auto}
.cmptbl{width:100%;border-collapse:collapse;font-size:13px;min-width:360px}
.cmptbl th{background:var(--bg0);color:var(--t2);font-weight:700;padding:9px 10px;text-align:left;border-bottom:2px solid var(--bd);white-space:nowrap}
.cmptbl td{padding:9px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
.cmptbl tr:last-child td{border-bottom:none}
.cmptbl tr:hover td{background:var(--blue-lt)}
.ibar{font-size:11px;color:var(--t3);margin-top:8px;text-align:right;font-weight:500}
.msg{text-align:center;color:var(--t3);padding:28px;font-size:13px}
.msg.empty{padding:40px 20px;font-size:14px;color:var(--t3);background:var(--bg2);border-radius:8px;border:1px dashed var(--bd2);margin-top:14px}
.result-hd{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 4px;display:flex;align-items:center;gap:8px}
.result-hd::after{content:'';flex:1;height:1px;background:var(--bd)}
@media print{
  body{background:#fff!important;padding:0}
  #app{max-width:100%!important;padding:0 12px}
  .no-print{display:none!important}
  .hd{padding:10px 0 8px}
  .card{box-shadow:none!important;border:1px solid #ddd!important;break-inside:avoid;page-break-inside:avoid;margin-top:10px}
  canvas{break-inside:avoid;page-break-inside:avoid}
  .cv-wrap{border:1px solid #ccc!important}
  .kcard,.ritem{background:#f8f8f8!important;border:1px solid #ddd!important}
  .cmptbl th{background:#f0f0f0!important}
  .vnote{background:#fff9e6!important;border-color:#f0d060!important}
  h1{font-size:18px!important}
}
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <h1>集装箱装载优化</h1>
    <p>垂直摆放约束 · 混合朝向算法（自动搜索最优排列）· 平面 &amp; 立体可视化</p>
    <div class="hd-bar">
      <div class="ubar">
        <span class="ubar-lbl">单位:</span>
        <div class="ubtn-g">
          <button class="ubtn" data-u="mm">mm</button>
          <button class="ubtn on" data-u="cm">cm</button>
          <button class="ubtn" data-u="m">m</button>
        </div>
        <label class="cvt-lbl">
          <input type="checkbox" id="chk-cvt" checked>
          切换时自动换算
        </label>
      </div>
      <button class="print-btn no-print" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>打印报告
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">
      <span class="ctitle"><span class="ctitle-bar"></span>集装箱内部尺寸</span>
      <select id="sel-preset">
        <option value="">自定义</option>
        <option value="20std">20尺标准柜 (5898×2352×2393 mm)</option>
        <option value="40std">40尺标准柜 (12032×2352×2393 mm)</option>
        <option value="40hc">40尺高柜 (12032×2352×2698 mm)</option>
        <option value="45hc">45尺高柜 (13556×2352×2698 mm)</option>
      </select>
    </div>
    <div class="drow">
      <div class="df"><label>内部长度</label><div class="iu"><input type="number" id="c-L" min="1" step="any" placeholder="请输入数据"><span class="u ulbl">cm</span></div></div>
      <div class="df"><label>内部宽度</label><div class="iu"><input type="number" id="c-W" min="1" step="any" placeholder="请输入数据"><span class="u ulbl">cm</span></div></div>
      <div class="df"><label>内部高度</label><div class="iu"><input type="number" id="c-H" min="1" step="any" placeholder="请输入数据"><span class="u ulbl">cm</span></div></div>
    </div>
    <div class="ibar" id="c-info"></div>
  </div>

  <div class="card">
    <div class="card-hd">
      <span class="ctitle"><span class="ctitle-bar"></span>产品箱子规格</span>
      <button class="addbtn no-print" id="btn-add" style="width:auto;padding:5px 12px;margin:0">＋ 添加产品</button>
    </div>
    <div class="btabs" id="btabs"></div>
    <div id="bform"></div>
    <div class="vnote">⚠ 液体产品垂直摆放，高度方向锁定不可翻转。系统自动枚举所有排列方案（原始朝向、旋转90°、混合双向排列），取最大装箱数。</div>
  </div>

  <div id="results"></div>
</div>

<script>
'use strict';

const UF={mm:1,cm:10,m:1000};
const UD={mm:0,cm:1,m:3};
const COLORS=['#3a80e0','#e8762a','#18b09e','#c040b8','#d8c020','#28a860','#d84060','#7050e0'];
const PRESETS={
  '20std':{L:5898,W:2352,H:2393}, '40std':{L:12032,W:2352,H:2393},
  '40hc': {L:12032,W:2352,H:2698}, '45hc': {L:13556,W:2352,H:2698},
};

let unit='cm';
let autoCvt=true;
let cont={L:null,W:null,H:null};
let boxes=[{id:1,name:'产品A',l:null,w:null,h:null,color:COLORS[0]}];
let activeIdx=0;
let nextId=2;

let renderTimer = null;
function requestRecalc() {
    if(renderTimer) clearTimeout(renderTimer);
    renderTimer = setTimeout(recalc, 150);
}

const dToMM = v => (v === '' || isNaN(v) || v === null) ? null : parseFloat(v) * UF[unit];
const mmToD = mm => { if(!mm) return ''; const v=mm/UF[unit]; const d=UD[unit]; return d===0?Math.round(v):parseFloat(v.toFixed(d)); };
const fmt=mm=>mmToD(mm).toString();
const fmtU=mm=>fmt(mm)+'\u202f'+unit;

function buildLayerBoxes(best, bl) {
    const lb = [];
    if (!best.mixed) {
        const type = best.rotated ? 'B' : 'A';
        for(let c=0; c<best.nx; c++) {
            for(let r=0; r<best.ny; r++) {
                lb.push({x: c*best.bx, y: r*best.by, w: best.bx, l: best.by, type});
            }
        }
    } else if (best.strips[0].dir === 'W') {
        let wy = 0;
        best.strips.forEach(s => {
            const type = (s.bx === bl) ? 'A' : 'B';
            for(let i=0; i<s.count; i++) {
                for(let ix=0; ix<s.nbox; ix++) {
                    lb.push({x: ix*s.bx, y: wy, w: s.bx, l: s.by, type});
                }
                wy += s.sw;
            }
        });
    } else {
        let wx = 0;
        best.strips.forEach(s => {
            const type = (s.bx === bl) ? 'A' : 'B';
            for(let i=0; i<s.count; i++) {
                for(let iy=0; iy<s.nbox; iy++) {
                    lb.push({x: wx, y: iy*s.by, w: s.bx, l: s.by, type});
                }
                wx += s.sl;
            }
        });
    }
    return lb;
}

function calcPack(cL,cW,cH,bl,bw,bh){
  if(!cL||!cW||!cH||!bl||!bw||!bh)return null;
  if(bh>cH)return null;
  const nz=Math.floor(cH/bh);
  if(!nz)return null;
  const remH=cH-nz*bh;

  let best=null;
  const tryR=r=>{
    if(r&&r.total>0&&(!best||r.total>best.total||(r.total===best.total&&r.util>best.util))) best=r;
  };

  const mkSimple=(bx,by)=>{
    if(bx>cL||by>cW)return;
    const nx=Math.floor(cL/bx), ny=Math.floor(cW/by);
    if(nx>5000 || ny>5000) return; 
    const perLayer=nx*ny, total=perLayer*nz;
    if(!total)return;
    tryR({nx,ny,nz,total,bx,by,bz:bh,perLayer,
      remL:cL-nx*bx,remW:cW-ny*by,remH,
      util:total*bl*bw*bh/(cL*cW*cH)*100,
      rotated:bx!==bl,mixed:false,strips:null});
  };
  mkSimple(bl,bw);
  mkSimple(bw,bl);

  if(bl!==bw) {
      const nA=Math.floor(cL/bl), nB=Math.floor(cL/bw);
      if(nA <= 5000 && nB <= 5000) {
          const maxA=Math.floor(cW/bw);
          for(let a=0;a<=maxA;a++){
            const b=Math.floor((cW-a*bw)/bl);
            if(a+b===0)continue;
            const perLayer=a*nA+b*nB;
            const total=perLayer*nz;
            if(!total)continue;
            const hasMix=a>0&&b>0;
            const stripsArr=[];
            if(a>0)stripsArr.push({dir:'W',count:a,sw:bw,nbox:nA,bx:bl,by:bw});
            if(b>0)stripsArr.push({dir:'W',count:b,sw:bl,nbox:nB,bx:bw,by:bl});
            tryR({nz,total,bz:bh,perLayer,remL:0,remW:cW-(a*bw+b*bl),remH,
              util:total*bl*bw*bh/(cL*cW*cH)*100,rotated:false,mixed:hasMix,strips:hasMix?stripsArr:null,
              nx:Math.max(nA,nB),ny:a+b,bx:bl,by:bw});
          }
      }

      const nC=Math.floor(cW/bw), nD=Math.floor(cW/bl);
      if(nC <= 5000 && nD <= 5000) {
          const maxC=Math.floor(cL/bl);
          for(let c=0;c<=maxC;c++){
            const d=Math.floor((cL-c*bl)/bw);
            if(c+d===0)continue;
            const perLayer=c*nC+d*nD;
            const total=perLayer*nz;
            if(!total)continue;
            const hasMix=c>0&&d>0;
            const stripsArr=[];
            if(c>0)stripsArr.push({dir:'L',count:c,sl:bl,nbox:nC,bx:bl,by:bw});
            if(d>0)stripsArr.push({dir:'L',count:d,sl:bw,nbox:nD,bx:bw,by:bl});
            tryR({nz,total,bz:bh,perLayer,remL:cL-(c*bl+d*bw),remW:0,remH,
              util:total*bl*bw*bh/(cL*cW*cH)*100,rotated:false,mixed:hasMix,strips:hasMix?stripsArr:null,
              nx:c+d,ny:Math.max(nC,nD),bx:bl,by:bw});
          }
      }
  }

  if (best) best.layerBoxes = buildLayerBoxes(best, bl);
  return best;
}

function syncUnit(){
  document.querySelectorAll('.ulbl').forEach(el=>el.textContent=unit);
  document.querySelectorAll('.ubtn').forEach(btn=>btn.classList.toggle('on',btn.dataset.u===unit));
}
function refreshContainerInfo(){
  if(!cont.L || !cont.W || !cont.H) {
      document.getElementById('c-info').textContent = '请完善集装箱尺寸';
      return;
  }
  const vol=(cont.L*cont.W*cont.H/1e9).toFixed(3);
  document.getElementById('c-info').textContent=`容积 ${vol} m³  ·  ${fmtU(cont.L)} × ${fmtU(cont.W)} × ${fmtU(cont.H)}`;
}
function setContainerInputs(){
  document.getElementById('c-L').value = mmToD(cont.L);
  document.getElementById('c-W').value = mmToD(cont.W);
  document.getElementById('c-H').value = mmToD(cont.H);
}
function readContainerInputs(){
  cont.L=dToMM(document.getElementById('c-L').value);
  cont.W=dToMM(document.getElementById('c-W').value);
  cont.H=dToMM(document.getElementById('c-H').value);
}
function escHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function renderTabs(){
  const el=document.getElementById('btabs');
  el.innerHTML='';
  boxes.forEach((b,i)=>{
    const btn=document.createElement('button');
    btn.className='btab'+(i===activeIdx?' on':'');
    if(i===activeIdx){btn.style.background=b.color+'22';btn.style.borderColor=b.color;btn.style.color=b.color}
    btn.innerHTML=`<span class="bdot" style="background:${b.color}"></span>${escHtml(b.name)}`+
      (boxes.length>1?`<span class="bdel" data-del="${i}">×</span>`:'');
    btn.addEventListener('click',e=>{
      if(e.target.dataset.del!==undefined){
        boxes.splice(+e.target.dataset.del,1);
        activeIdx=Math.min(activeIdx,boxes.length-1);
      }else{activeIdx=i}
      renderTabs();renderForm();requestRecalc();
    });
    el.appendChild(btn);
  });
}

function renderForm(){
  const b=boxes[activeIdx];
  if(!b)return;
  document.getElementById('bform').innerHTML=`
    <div class="df" style="margin-bottom:10px">
      <label>产品名称</label>
      <input type="text" id="b-name" value="${escHtml(b.name)}" placeholder="请输入名称">
    </div>
    <div class="drow">
      <div class="df"><label>箱子长度</label><div class="iu"><input type="number" id="b-l" min="1" step="any" value="${mmToD(b.l)}" placeholder="请输入数据"><span class="u ulbl">${unit}</span></div></div>
      <div class="df"><label>箱子宽度</label><div class="iu"><input type="number" id="b-w" min="1" step="any" value="${mmToD(b.w)}" placeholder="请输入数据"><span class="u ulbl">${unit}</span></div></div>
      <div class="df"><label>箱子高度 🔒</label><div class="iu"><input type="number" id="b-h" min="1" step="any" value="${mmToD(b.h)}" placeholder="请输入数据"><span class="u ulbl">${unit}</span></div></div>
    </div>`;
  const save=()=>{
    boxes[activeIdx]={...b,
      name:document.getElementById('b-name').value.trim()||b.name,
      l:dToMM(document.getElementById('b-l').value),
      w:dToMM(document.getElementById('b-w').value),
      h:dToMM(document.getElementById('b-h').value)};
    renderTabs();requestRecalc();
  };
  ['b-name','b-l','b-w','b-h'].forEach(id=>document.getElementById(id).addEventListener('input',save));
}

function buildStripDesc(p){
  if(!p.strips)return null;
  return p.strips.map(s=>{
    if(s.dir==='W') return `${s.count}排 × ${s.nbox}箱/排（底面 ${fmt(s.bx)}×${fmt(s.by)} ${unit}）`;
    return `${s.count}列 × ${s.nbox}箱/列（底面 ${fmt(s.bx)}×${fmt(s.by)} ${unit}）`;
  }).join(' + ');
}

function recalc(){
  readContainerInputs();
  refreshContainerInfo();
  const el=document.getElementById('results');
  
  const b0 = boxes[0];
  if(!cont.L || !cont.W || !cont.H || !b0.l || !b0.w || !b0.h){
      el.innerHTML=`<div class="msg empty">✨ 请在上方输入完整的集装箱与产品尺寸，系统将自动计算装载方案。</div>`;
      return;
  }

  const packs=boxes.map(b=>({b,p:calcPack(cont.L,cont.W,cont.H,b.l,b.w,b.h)}));

  if(packs.every(({p})=>!p||p.total===0)){
    el.innerHTML=`<div class="card"><div class="msg">📦 无法装载：请检查箱子尺寸是否超出集装箱</div></div>`;
    return;
  }

  let html='';
  if(boxes.length>1){
    html+=`<div class="card">
      <div class="card-hd"><span class="ctitle"><span class="ctitle-bar"></span>产品对比</span></div>
      <div class="tbl-wrap"><table class="cmptbl"><thead><tr>
        <th>产品</th><th>装箱量</th><th>层数</th><th>每层</th><th>利用率</th><th>方案</th>
      </tr></thead><tbody>`;
    packs.forEach(({b,p})=>{
      if(!p)return;
      const uc=p.util>=85?'var(--teal)':p.util>=70?'var(--amber)':'var(--red)';
      html+=`<tr>
        <td><span style="display:inline-flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:2px;background:${b.color};display:inline-block;flex-shrink:0"></span>
          <b>${escHtml(b.name)}</b></span></td>
        <td><b>${p.total.toLocaleString()}</b></td>
        <td>${p.nz}</td><td>${p.perLayer}</td>
        <td style="color:${uc};font-weight:800">${p.util.toFixed(1)}%</td>
        <td>${p.mixed&&p.strips?'<span class="mix-badge">混合排列</span>':''}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
  }

  packs.forEach(({b,p},idx)=>{
    if(!p||p.total===0){
      html+=`<div class="card"><div class="msg">⚠ ${escHtml(b.name)}：箱子尺寸超出集装箱，无法装载</div></div>`;
      return;
    }
    const uc=p.util>=85?'var(--teal)':p.util>=70?'var(--amber)':'var(--red)';

    let orientText;
    if(p.mixed&&p.strips){
      orientText=`${p.strips[0].dir==='W'?'宽度方向混排':'长度方向混排'} <span class="new-badge">优化</span>`;
    }else if(p.rotated){
      orientText=`底面旋转90° (${fmt(p.bx)}×${fmt(p.by)} ${unit})`;
    }else{
      orientText=`原始朝向 (${fmt(p.bx)}×${fmt(p.by)} ${unit})`;
    }

    const stripDesc=buildStripDesc(p);
    const stripRow=stripDesc?`<li><span class="dk">排列方案</span><span class="dv" style="color:var(--blue);font-size:12px">${stripDesc}</span></li>`:'';

    const showRemL=p.strips&&p.strips[0].dir==='W'?'—':fmt(p.remL)+'<small style="font-size:10px;margin-left:1px">'+unit+'</small>';
    const showRemW=p.strips&&p.strips[0].dir==='L'?'—':fmt(p.remW)+'<small style="font-size:10px;margin-left:1px">'+unit+'</small>';

    html+=`
    <div class="result-hd">
      <span style="width:8px;height:8px;border-radius:2px;background:${b.color};display:inline-block;flex-shrink:0"></span>
      ${escHtml(b.name)} 计算结果
    </div>
    <div class="card">
      <div class="card-hd">
        <span class="ctitle"><span class="ctitle-bar"></span>${escHtml(b.name)} — 计算结果</span>
        ${p.mixed&&p.strips?'<span class="mix-badge">混合朝向优化</span>':''}
      </div>
      <div class="krow">
        <div class="kcard">
          <div class="kval" style="color:${uc}">${p.util.toFixed(1)}%</div>
          <div class="klbl">空间利用率</div>
        </div>
        <div class="kcard">
          <div class="kval" style="color:var(--blue)">${p.total.toLocaleString()}</div>
          <div class="klbl">最大装箱数</div>
          <div class="ksub">${p.nz}层 × ${p.perLayer}箱/层</div>
        </div>
        <div class="kcard">
          <div class="kval">${p.nz}</div>
          <div class="klbl">层数</div>
          <div class="ksub">${fmt(p.bz)} ${unit}/层</div>
        </div>
      </div>
      <div class="rrow">
        <div class="ritem"><div class="rval">${showRemL}</div><div class="rlbl">长度余量</div></div>
        <div class="ritem"><div class="rval">${showRemW}</div><div class="rlbl">宽度余量</div></div>
        <div class="ritem"><div class="rval">${fmt(p.remH)}<small style="font-size:10px;margin-left:1px">${unit}</small></div><div class="rlbl">高度余量</div></div>
      </div>
      <ul class="dlist">
        <li><span class="dk">摆放方向</span><span class="dv">${orientText}</span></li>
        ${stripRow}
        <li><span class="dk">每层排列</span><span class="dv">${p.perLayer} 箱/层</span></li>
        <li><span class="dk">箱子尺寸</span><span class="dv">${fmt(b.l)}×${fmt(b.w)}×${fmt(b.h)} ${unit}</span></li>
        <li><span class="dk">集装箱内尺</span><span class="dv">${fmt(cont.L)}×${fmt(cont.W)}×${fmt(cont.H)} ${unit}</span></li>
      </ul>
    </div>
    <div class="card">
      <div class="card-hd">
        <span class="ctitle"><span class="ctitle-bar"></span>平面布局（俯视图）</span>
        <span style="font-size:11px;color:var(--t3);font-weight:600">每格代表1箱</span>
      </div>
      <div class="cv-wrap"><canvas id="cv2d-${idx}" height="260"></canvas></div>
      <div class="cv-legend">
        <div class="cv-leg-item">
          <span style="width:14px;height:10px;background:${b.color}cc;border:1.5px solid ${b.color};border-radius:2px;display:inline-block"></span>
          原始朝向（${fmt(b.l)}×${fmt(b.w)} ${unit}）
        </div>
        <div class="cv-leg-item">
          <span style="width:14px;height:10px;background:${b.color}44;border:1.5px dashed ${b.color};border-radius:2px;display:inline-block;position:relative;overflow:hidden">
            <span style="position:absolute;top:-5px;bottom:-5px;left:6px;width:1.5px;background:${b.color}88;transform:rotate(45deg)"></span>
          </span>
          旋转90°（${fmt(b.w)}×${fmt(b.l)} ${unit}）
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">
        <span class="ctitle"><span class="ctitle-bar"></span>立体示意（等轴视图）</span>
        <span style="font-size:11px;color:var(--t3);font-weight:600">拖拽旋转视角</span>
      </div>
      <div class="cv-wrap"><canvas id="cviso-${idx}" height="320"></canvas></div>
    </div>`;
  });

  el.innerHTML=html;

  requestAnimationFrame(()=>{
    packs.forEach(({b,p},idx)=>{
      if(!p||!p.total)return;
      const cv2=document.getElementById(`cv2d-${idx}`);
      const cvI=document.getElementById(`cviso-${idx}`);
      if(cv2)drawFloor(cv2,p,b);
      if(cvI)initIso(cvI,p,b);
    });
  });
}

function drawFloor(cv,p,b){
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.offsetWidth||300, H=260;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);

  // 四面都预留绘制数字的空间
  const PL=35, PR=35, PT=35, PB=45; 
  const dw=W-PL-PR, dh=H-PT-PB;
  const cL=cont.L, cW=cont.W;
  const sx=dw/cL, sy=dh/cW;

  ctx.fillStyle='#f7fafc';ctx.fillRect(0,0,W,H);

  const col=b.color;
  const fillA=col+'cc', strokeA=col;
  const fillB=col+'44', strokeB=col;

  ctx.fillStyle='#ffffff';ctx.fillRect(PL,PT,dw,dh);
  ctx.strokeStyle='rgba(37,99,235,.55)';ctx.lineWidth=1.5;
  ctx.strokeRect(PL,PT,dw,dh);

  p.layerBoxes.forEach(box => {
      const isB = box.type === 'B';
      const px = PL + box.x * sx;
      const py = PT + box.y * sy;
      const pw = box.w * sx;
      const ph = box.l * sy;

      ctx.fillStyle = isB ? fillB : fillA;
      ctx.fillRect(px, py, pw, ph);

      if(isB){
          ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+pw,py+ph);
          ctx.strokeStyle=col+'88';ctx.lineWidth=0.8;ctx.stroke();
      }

      ctx.strokeStyle = isB ? strokeB : strokeA;
      ctx.lineWidth = 1;
      if(isB) ctx.setLineDash([4, 4]); else ctx.setLineDash([]);
      ctx.strokeRect(px, py, pw, ph);
  });
  ctx.setLineDash([]);

  const drawRem=(px,py,pw,ph)=>{
    if(pw<=0||ph<=0)return;
    ctx.fillStyle='rgba(220,50,50,.06)';ctx.fillRect(px,py,pw,ph);
    ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(220,50,50,.4)';
    ctx.lineWidth=0.8;ctx.strokeRect(px,py,pw,ph);ctx.setLineDash([]);
  };

  if(!p.mixed){
    if(p.remL>0) drawRem(PL+p.nx*p.bx*sx, PT, p.remL*sx, dh);
    if(p.remW>0) drawRem(PL, PT+p.ny*p.by*sy, dw, p.remW*sy);
  }

  // ==== 核心升级：四面动态绘制真实坐标系列 ====
  const minY = Math.min(...p.layerBoxes.map(b => b.y));
  const maxY = Math.max(...p.layerBoxes.map(b => b.y));
  const minX = Math.min(...p.layerBoxes.map(b => b.x));
  const maxX = Math.max(...p.layerBoxes.map(b => b.x));

  // 提取四条边缘的箱子数组，并严格排序
  const topBoxes = p.layerBoxes.filter(b => b.y === minY).sort((a,b)=>a.x-b.x);
  const bottomBoxes = p.layerBoxes.filter(b => b.y === maxY).sort((a,b)=>a.x-b.x);
  const leftBoxes = p.layerBoxes.filter(b => b.x === minX).sort((a,b)=>a.y-b.y);
  const rightBoxes = p.layerBoxes.filter(b => b.x === maxX).sort((a,b)=>a.y-b.y);

  // 通用序列号绘制函数
  function drawSeq(boxArray, isHorizontal, pos, color) {
      if (!boxArray.length) return;
      ctx.fillStyle = color;
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center'; 
      ctx.textBaseline = 'middle';

      let lastDrawnEnd = -999;
      const minGap = 4;
      const lastIdx = boxArray.length - 1;
      const lastBox = boxArray[lastIdx];

      if (isHorizontal) {
          const lastStr = String(lastIdx + 1);
          const lastWidth = ctx.measureText(lastStr).width;
          const lastCenter = PL + lastBox.x * sx + (lastBox.w * sx) / 2;
          const lastStart = lastCenter - lastWidth / 2;

          boxArray.forEach((box, idx) => {
              const str = String(idx + 1);
              const textWidth = ctx.measureText(str).width;
              const center = PL + box.x * sx + (box.w * sx) / 2;
              const start = center - textWidth / 2;
              const end = center + textWidth / 2;

              if (start > lastDrawnEnd + minGap) {
                  if (idx !== lastIdx && end > lastStart - minGap) return;
                  ctx.fillText(str, center, pos);
                  lastDrawnEnd = end;
              }
          });
      } else {
          const lastCenter = PT + lastBox.y * sy + (lastBox.l * sy) / 2;
          const lastStart = lastCenter - 6;

          boxArray.forEach((box, idx) => {
              const str = String(idx + 1);
              const center = PT + box.y * sy + (box.l * sy) / 2;
              const start = center - 6;
              const end = center + 6;

              if (start > lastDrawnEnd + minGap) {
                  if (idx !== lastIdx && end > lastStart - minGap) return;
                  ctx.fillText(str, pos, center);
                  lastDrawnEnd = end;
              }
          });
      }
  }

  // 顶部与底部：显示列数（红字）
  drawSeq(topBoxes, true, PT - 14, '#dc2626');
  drawSeq(bottomBoxes, true, PT + dh + 14, '#dc2626');

  // 左侧与右侧：显示排数（深蓝字）
  drawSeq(leftBoxes, false, PL - 14, '#1d4ed8');
  drawSeq(rightBoxes, false, PL + dw + 14, '#1d4ed8');

  // 底部统计信息
  ctx.fillStyle='#8fa5be';ctx.font='600 10px sans-serif';
  ctx.fillText(`长 ${fmtU(cL)} · ${p.perLayer} 箱/层`, PL+dw/2, H-10);
}

function proj(wx,wy,wz,rY,rX,scale,ocx,ocy){
  const cosY=Math.cos(rY),sinY=Math.sin(rY);
  const x2=wx*cosY-wy*sinY,y2=wx*sinY+wy*cosY;
  const cosX=Math.cos(rX),sinX=Math.sin(rX);
  return{sx:ocx+x2*scale,sy:ocy-(y2*sinX+wz*cosX)*scale,d:y2*cosX-wz*sinX};
}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function shade(rgb,f){return`rgb(${Math.round(Math.min(255,rgb[0]*f))},${Math.round(Math.min(255,rgb[1]*f))},${Math.round(Math.min(255,rgb[2]*f))})`}

function drawIso(cv,p,b,rY,rX){
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.offsetWidth||300, H=320;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#f0f4f8';ctx.fillRect(0,0,W,H);

  const{nz,bz}=p;
  const cL=cont.L, cW=cont.W, cH=cont.H;

  const isoW = Math.abs(cL * Math.cos(rY)) + Math.abs(cW * Math.sin(rY));
  const isoH = Math.abs(cL * Math.sin(rY) * Math.sin(Math.abs(rX)))
             + Math.abs(cW * Math.cos(rY) * Math.sin(Math.abs(rX)))
             + Math.abs(cH * Math.cos(Math.abs(rX)));
  const scale = Math.min(W * 0.85 / isoW, H * 0.80 / isoH);
  
  const ocx=W/2,ocy=H/2 + (cH*scale*0.4);
  const PR=(wx,wy2,wz)=>proj(wx-cL/2,wy2-cW/2,wz-cH/2,rY,rX,scale,ocx,ocy);

  const CV=[[0,0,0],[cL,0,0],[0,cW,0],[cL,cW,0],[0,0,cH],[cL,0,cH],[0,cW,cH],[cL,cW,cH]];
  const CE=[[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
  const Cp=CV.map(([x,y,z])=>PR(x,y,z));
  ctx.strokeStyle='rgba(37,99,235,.35)';ctx.lineWidth=.8;
  CE.forEach(([a,b2])=>{ctx.beginPath();ctx.moveTo(Cp[a].sx,Cp[a].sy);ctx.lineTo(Cp[b2].sx,Cp[b2].sy);ctx.stroke()});

  const rgbA=hexRgb(b.color);
  const rgbB=[Math.min(255,rgbA[0]+65), Math.min(255,rgbA[1]+65), Math.min(255,rgbA[2]+45)]; 

  const drawFace=(pts, clr, strokeClr)=>{
    ctx.beginPath();ctx.moveTo(pts[0].sx,pts[0].sy);
    pts.slice(1).forEach(pt=>ctx.lineTo(pt.sx,pt.sy));
    ctx.closePath();
    ctx.fillStyle=clr;ctx.fill();
    ctx.strokeStyle=strokeClr; 
    ctx.lineWidth=0.6;ctx.stroke(); 
  };

  const items = [];
  const drawLimit = 2500; 
  
  if (p.total <= drawLimit) {
      for(let iz=0; iz<nz; iz++){
          p.layerBoxes.forEach(box => {
              items.push({x:box.x, y:box.y, z:iz*bz, w:box.w, l:box.l, h:bz, type:box.type, d: PR(box.x+box.w/2, box.y+box.l/2, iz*bz+bz/2).d});
          });
      }
  } else {
      p.layerBoxes.forEach(box => {
          items.push({x:box.x, y:box.y, z:0, w:box.w, l:box.l, h:nz*bz, type:box.type, d: PR(box.x+box.w/2, box.y+box.l/2, nz*bz/2).d});
      });
  }

  items.sort((a,b2)=>a.d - b2.d);

  items.forEach(box => {
      const wx=box.x, wy2=box.y, wz=box.z;
      const bx=box.w, by=box.l, bh=box.h;
      const p00=PR(wx,wy2,wz),p10=PR(wx+bx,wy2,wz),p01=PR(wx,wy2+by,wz),p11=PR(wx+bx,wy2+by,wz);
      const p00t=PR(wx,wy2,wz+bh),p10t=PR(wx+bx,wy2,wz+bh),p01t=PR(wx,wy2+by,wz+bh),p11t=PR(wx+bx,wy2+by,wz+bh);
      
      const faces=[
        {pts:[p00,p10,p11,p01],   f:.52, s:'rgba(255,255,255,0.1)'}, 
        {pts:[p00t,p10t,p11t,p01t], f:.95, s:'rgba(255,255,255,0.4)'}, 
        {pts:[p00,p10,p10t,p00t],   f:.65, s:'rgba(0,0,0,0.3)'},
        {pts:[p10,p11,p11t,p10t],   f:.42, s:'rgba(0,0,0,0.4)'},
        {pts:[p00,p01,p01t,p00t],   f:.72, s:'rgba(0,0,0,0.3)'},
        {pts:[p01,p11,p11t,p01t],   f:.48, s:'rgba(0,0,0,0.4)'},
      ].map(fa=>({...fa,d:fa.pts.reduce((s,pt)=>s+pt.d,0)/fa.pts.length}));
      
      faces.sort((a,b2)=>a.d-b2.d);
      
      const cRgb = box.type === 'B' ? rgbB : rgbA;
      faces.forEach(({pts,f,s})=>drawFace(pts, shade(cRgb,f), s));
  });

  ctx.fillStyle=b.color;ctx.font='700 12px sans-serif';ctx.textAlign='center';
  ctx.fillText(`${nz}层 × ${p.perLayer}箱/层 = ${p.total.toLocaleString()}箱`,W/2,H-12);
}

function initIso(cv,p,b){
  let rotY=0.62,rotX=-0.28;
  const render=()=>drawIso(cv,p,b,rotY,rotX);
  render();
  let drag=null;
  const getP=e=>e.touches?[e.touches[0].clientX,e.touches[0].clientY]:[e.clientX,e.clientY];
  cv.addEventListener('mousedown',e=>{drag=getP(e)});
  cv.addEventListener('mousemove',e=>{
    if(!drag)return;
    const[cx,cy]=getP(e);
    rotY+=(cx-drag[0])*.007;rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX+(cy-drag[1])*.007));
    drag=[cx,cy];render();
  });
  ['mouseup','mouseleave'].forEach(ev=>cv.addEventListener(ev,()=>drag=null));
  cv.addEventListener('touchstart',e=>{e.preventDefault();drag=getP(e)},{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();if(!drag)return;
    const[cx,cy]=getP(e);
    rotY+=(cx-drag[0])*.007;rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX+(cy-drag[1])*.007));
    drag=[cx,cy];render();
  },{passive:false});
  cv.addEventListener('touchend',()=>drag=null);
}

document.querySelectorAll('.ubtn').forEach(btn=>btn.addEventListener('click',()=>{
  const nu=btn.dataset.u;
  if(nu===unit)return;
  autoCvt=document.getElementById('chk-cvt').checked;
  const factor = UF[unit] / UF[nu];
  
  if(autoCvt){
    ['c-L','c-W','c-H','b-l','b-w','b-h'].forEach(id=>{
      const el=document.getElementById(id);
      if(el && el.value) el.value=parseFloat((parseFloat(el.value)*factor).toFixed(UD[nu]));
    });
    unit=nu; readContainerInputs();
  } else {
    boxes.forEach(b=>{ if(b.l)b.l *= factor; if(b.w)b.w *= factor; if(b.h)b.h *= factor; });
    unit=nu; readContainerInputs(); 
  }
  syncUnit(); requestRecalc();
}));

document.getElementById('chk-cvt').addEventListener('change',e=>{autoCvt=e.target.checked});

document.getElementById('sel-preset').addEventListener('change',e=>{
  const pr=PRESETS[e.target.value];
  if(pr){
      cont={L:pr.L,W:pr.W,H:pr.H};
  } else {
      cont={L:null,W:null,H:null}; 
  }
  setContainerInputs();refreshContainerInfo();requestRecalc();
});

['c-L','c-W','c-H'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{readContainerInputs();refreshContainerInfo();requestRecalc()});
});

document.getElementById('btn-add').addEventListener('click',()=>{
  boxes.push({id:nextId++,name:`产品${String.fromCharCode(65+boxes.length)}`,
    l:null,w:null,h:null,color:COLORS[boxes.length%COLORS.length]});
  activeIdx=boxes.length-1;
  renderTabs();renderForm();requestRecalc();
});

window.addEventListener('resize',()=>requestRecalc());

syncUnit();renderTabs();renderForm();refreshContainerInfo();requestRecalc();
</script>
